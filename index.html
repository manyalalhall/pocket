<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pocket</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app">
      <p>Pocket</p>
    </div>

    <div class="wallet" id="walletBtn"></div>
    <div class="modal" id="modal">
      <div class ="modal-content" id="modalContent">
        <button id="closeBtn">X</button>
        <img id="imageDisplay" style="display:none; width:100%; border-radius:8px;"/>
        <input type="file" id="imageInput" accept="image/*" multiple/>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
