<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pocket</title>
    <link href="https://fonts.googleapis.com/css2?family=Goudy+Stout&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app">
      <p>Pocket</p>
    </div>

    <div class="wallet" id="walletBtn"></div>

    <!-- Add Pictures button  -->
    <input type="file" id="imageInput" accept="image/*" multiple style="display:none"/>
    <button id="addPicturesBtn">Add Pictures</button>

    <div class="modal" id="modal">
      <div class="modal-content" id="modalContent">
        <button id="closeBtn">✕</button>
        <img id="imageDisplay" />
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
